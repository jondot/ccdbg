name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build web
        run: |
          cd web && npm ci && npm run build && cd ..

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ccdbg-${{ matrix.target }}.tar.gz ccdbg
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ccdbg-${{ matrix.target }}
          path: ccdbg-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts
        run: |
          find artifacts -name '*.tar.gz' -print0 | while IFS= read -r -d '' f; do
            cosign sign-blob --yes \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.bundle
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare npm packages
        run: |
          mkdir -p npm/ccdbg/bin
          tar xzf artifacts/ccdbg-aarch64-apple-darwin/ccdbg-aarch64-apple-darwin.tar.gz   -C npm/cli-darwin-arm64/ 2>/dev/null || true
          tar xzf artifacts/ccdbg-x86_64-apple-darwin/ccdbg-x86_64-apple-darwin.tar.gz     -C npm/cli-darwin-x64/  2>/dev/null || true
          tar xzf artifacts/ccdbg-x86_64-unknown-linux-gnu/ccdbg-x86_64-unknown-linux-gnu.tar.gz -C npm/cli-linux-x64/ 2>/dev/null || true
          tar xzf artifacts/ccdbg-aarch64-unknown-linux-gnu/ccdbg-aarch64-unknown-linux-gnu.tar.gz -C npm/cli-linux-arm64/ 2>/dev/null || true

      - name: Publish platform packages
        run: |
          for pkg in npm/cli-darwin-arm64 npm/cli-darwin-x64 npm/cli-linux-x64 npm/cli-linux-arm64; do
            [ -d "$pkg" ] && cd "$pkg" && npm publish --access public || true && cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: cd npm/ccdbg && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
